{% extends "index.html" %} {% block title %}Sign In{% endblock title %} {% block
content %}
<div
  class="min-h-screen flex items-center justify-center px-6"
  style="background-color: #355872"
>
  <div
    class="w-full max-w-md rounded-2xl p-8 shadow-2xl"
    style="background-color: #f7f8f0"
  >
    <!-- Logo -->
    <div class="flex flex-col items-center">
      <img
        src="/assets/logo.ico"
        alt="Upload-dio"
        class="h-12 w-12 rounded-xl"
      />

      <h1
        class="mt-2 text-md font-semibold text-center my-3"
        style="color: #7aaace"
      >
        Sign in to continue to Upload-dio
      </h1>
    </div>

    <!-- Form -->
    <form action="#" method="POST" class="mt-5 space-y-5">
      <div>
        <label
          for="username"
          class="block text-sm font-semibold mb-2"
          style="color: #355872"
        >
          Username
        </label>

        <input
          id="username"
          type="text"
          name="username"
          autocomplete="username"
          required
          class="w-full rounded-xl border px-4 py-2 outline-none transition"
          style="border-color: #7aaace; background-color: white; color: #355872"
        />
      </div>

      <div>
        <label
          for="password"
          class="block text-sm font-semibold mb-2"
          style="color: #355872"
        >
          Password
        </label>

        <input
          id="password"
          type="password"
          name="password"
          autocomplete="current-password"
          required
          class="w-full rounded-xl border px-4 py-2 outline-none transition"
          style="border-color: #7aaace; background-color: white; color: #355872"
        />
      </div>

      <button
        type="submit"
        class="w-full rounded-xl py-2 font-semibold text-white transition hover:opacity-90"
        style="background-color: #355872"
      >
        Sign In
      </button>
    </form>
  </div>
</div>
{% endblock content %}
